market = "cac40"
# ticker = "AAPL" # Utiliser ticker OU market, pas les deux.
start = "2000-01-01"
sector = "Financials"
sub_sector = "Banks"
run_ml = false
run_dmn = true

[backtest]
sigma_target_annual = 0.15
vol_span = 60
cost_bps = 2.0
portfolio_vol_target = true
min_obs = 400

[model]
hidden = 32
dropout = 0.1
use_ticker_embedding = true

[optimization]
strategy = "DMN_LSTM_Sharpe_TurnPen"
metric = "sharpe"
hidden_values = [64, 128]
dropout_values = [0.3, 0.4, 0.5]
batch_size_values = [32, 64]
learning_rate_values = [0.001, 0.0001]
epochs_values = [10, 50]
